<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 量化戰情室 V2</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 1.1em; }
        th, td { padding: 15px; border-bottom: 1px solid #333; text-align: center; }
        th { background: #252525; color: #00e5ff; }
        .price { font-weight: bold; color: #fff; }
        .trend-up { color: #ff5252; font-weight: bold; background: rgba(255, 82, 82, 0.1); border-radius: 5px; padding: 5px 10px; }
        .trend-down { color: #69f0ae; font-weight: bold; background: rgba(105, 240, 174, 0.1); border-radius: 5px; padding: 5px 10px; }
        #status { text-align: right; font-size: 0.8em; color: #777; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI 即時交易戰情室</h1>
        <div id="status">系統連線中...</div>
        <table>
            <thead>
                <tr>
                    <th>時間</th>
                    <th>標的</th>
                    <th>成交價</th>
                    <th>AI 預測方向</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
    </div>

<script>
        async function updateData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                const tbody = document.getElementById('data-body');
                tbody.innerHTML = ''; // 清空舊資料
                
                data.forEach(item => {
                    // --- 修改重點：讀取資料庫存入的真實 prediction 欄位 ---
                    // 如果資料庫裡沒資料，預設顯示 "待命中"
                    const signalText = item.prediction || "待命中";
                    
                    // 根據文字內容決定顏色：包含 "看漲" 就用紅色 (trend-up)，否則用綠色 (trend-down)
                    const signalClass = signalText.includes("看漲") ? 'trend-up' : 'trend-down';

                    const row = `<tr>
                        <td>${item.datetime.split(' ')[1]}</td>
                        <td><strong>${item.stock_id}</strong></td>
                        <td class="price">${Number(item.price).toFixed(2)}</td>
                        <td><span class="${signalClass}">${signalText}</span></td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
                
                document.getElementById('status').innerText = '最後同步：' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Fetch error:", e);
                document.getElementById('status').innerText = '連線異常...';
            }
        }

        // 每 5 秒自動向後端 API 請求一次最新數據
        setInterval(updateData, 5000);
        updateData(); // 網頁開啟時立即執行一次
    </script>
</body>
</html>
